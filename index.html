<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MONTIS — Crystal pure artesian water from the mountains</title>
    <meta name="description" content="MONTIS is a new brand of natural artesian drinking water, drawn from a deep spring in the Chirchik river valley." />
    <!-- Critical image + video assets used in the first viewport. -->
    <link rel="preload" href="/media/mountain-lake-hero.jpg" as="image" fetchpriority="high" />
    <link rel="preload" href="/media/Meshy_AI_video.mp4" as="video" type="video/mp4" />
    <!-- Preconnect + preload font stylesheet to reduce text render delay. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
      as="style"
    />
    <!-- Next-interaction media are fetched with low priority in idle time. -->
    <link rel="prefetch" href="/media/mountain-valley.jpg" as="image" />
    <link rel="prefetch" href="/media/filtration.png" as="image" />
    <link rel="prefetch" href="/media/uv.png" as="image" />
    <link rel="prefetch" href="/media/ozone.png" as="image" />
    <link rel="prefetch" href="/media/osmos.png" as="image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
